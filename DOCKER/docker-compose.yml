# docker-compose.yml
# Kolrose Limited - Policy Assistant
# Two-service architecture: Backend API + Frontend Streamlit

version: '3.8'

services:
  # ============================================================================
  # Backend Service - FastAPI + ChromaDB + RAG Logic
  # ============================================================================
  backend:
    build:
      context: ..
      dockerfile: DOCKER/Dockerfile.backend
    container_name: kolrose-backend
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=google/gemini-2.0-flash-001
      - EMBEDDING_DEVICE=cpu
      - APP_ENV=production
      - CHROMA_PATH=/app/chroma_db
      - POLICIES_PATH=/app/policies
      - PYTHONUNBUFFERED=1
    volumes:
      - chroma_data:/app/chroma_db
      - ../BACKEND/policies:/app/policies:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - kolrose-network

  # ============================================================================
  # Frontend Service - Streamlit UI
  # ============================================================================
  frontend:
    build:
      context: ..
      dockerfile: DOCKER/Dockerfile.frontend
    container_name: kolrose-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
      - PYTHONUNBUFFERED=1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - kolrose-network

  # ============================================================================
  # Optional: Nginx Reverse Proxy (for production-like setup)
  # ============================================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: kolrose-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - kolrose-network

volumes:
  chroma_data:
    driver: local

networks:
  kolrose-network:
    driver: bridge
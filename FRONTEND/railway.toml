[build]
builder = "dockerfile"
dockerfilePath = "DOCKER/Dockerfile.frontend"

[deploy]
startCommand = "streamlit run FRONTEND/streamlit_app.py --server.port 8080 --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false --server.enableWebsocketCompression false --browser.gatherUsageStats false --server.maxUploadSize 10"
restartPolicy = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
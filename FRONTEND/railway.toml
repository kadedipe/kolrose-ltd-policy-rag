[build]
builder = "dockerfile"
dockerfilePath = "DOCKER/Dockerfile.frontend"

[deploy]
startCommand = "streamlit run FRONTEND/streamlit_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false"
restartPolicy = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
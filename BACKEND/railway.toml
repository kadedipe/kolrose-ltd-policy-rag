[build]
builder = "dockerfile"
dockerfilePath = "DOCKER/Dockerfile.backend"

[deploy]
# No pre-deploy - API handles ingestion on startup with lazy loading
startCommand = "uvicorn BACKEND.app.api:app --host 0.0.0.0 --port 8080 --workers 1 --limit-concurrency 10 --limit-max-requests 100 --timeout-keep-alive 30"
restartPolicy = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
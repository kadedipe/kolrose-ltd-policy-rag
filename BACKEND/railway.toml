[build]
builder = "dockerfile"
dockerfilePath = "DOCKER/Dockerfile.backend"

[deploy]
preDeployCommand = "export CHROMA_PATH=/tmp/chroma_db && export POLICIES_PATH=/app/BACKEND/policies && cd /app/BACKEND && python -m app.ingestion"
startCommand = "uvicorn BACKEND.app.api:app --host 0.0.0.0 --port 8080"
restartPolicy = "ON_FAILURE"
restartPolicyMaxRetries = 10
cat > BACKEND/railway.toml << 'EOF'
[build]
builder = "dockerfile"
dockerfilePath = "DOCKER/Dockerfile.backend"

[deploy]
# No pre-deploy - API handles ingestion on startup
startCommand = "uvicorn BACKEND.app.api:app --host 0.0.0.0 --port 8080"
restartPolicy = "ON_FAILURE"
restartPolicyMaxRetries = 10
EOF